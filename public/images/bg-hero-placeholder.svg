<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#181818;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <!-- Placeholder text -->
  <text x="960" y="540" text-anchor="middle" fill="#FFD700" font-family="Arial" font-size="24" opacity="0.3">Place your bg-hero.jpg here</text>
</svg>
